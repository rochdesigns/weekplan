<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#16233A">
  <title>Weekplan</title>
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'%3E%3Cg fill='%23185FA5'%3E%3Crect x='0.8' y='2.8' width='4.4' height='4.4' rx='1.2'/%3E%3Crect x='3.05' y='9.8' width='4.4' height='4.4' rx='1.2'/%3E%3Crect x='5.3' y='16.8' width='4.4' height='4.4' rx='1.2'/%3E%3Crect x='9.8' y='9.8' width='4.4' height='4.4' rx='1.2'/%3E%3Crect x='14.3' y='16.8' width='4.4' height='4.4' rx='1.2'/%3E%3Crect x='16.55' y='9.8' width='4.4' height='4.4' rx='1.2'/%3E%3Crect x='18.8' y='2.8' width='4.4' height='4.4' rx='1.2'/%3E%3C/g%3E%3C/svg%3E">
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/grid.css">
  <link rel="stylesheet" href="css/mini-cal.css">
  <link rel="stylesheet" href="css/blocks.css">
  <link rel="stylesheet" href="css/modal.css">
</head>
<body>
  <!-- Zone 1: Top bar -->
  <header id="topbar">
    <div class="brand">
      <svg class="brand-mark" viewBox="0 0 24 24" width="22" height="22" aria-hidden="true">
        <g fill="#185FA5">
          <rect x="0.8"  y="2.8"  width="4.4" height="4.4" rx="1.2"/>
          <rect x="3.05" y="9.8"  width="4.4" height="4.4" rx="1.2"/>
          <rect x="5.3"  y="16.8" width="4.4" height="4.4" rx="1.2"/>
          <rect x="9.8"  y="9.8"  width="4.4" height="4.4" rx="1.2"/>
          <rect x="14.3" y="16.8" width="4.4" height="4.4" rx="1.2"/>
          <rect x="16.55" y="9.8" width="4.4" height="4.4" rx="1.2"/>
          <rect x="18.8" y="2.8"  width="4.4" height="4.4" rx="1.2"/>
        </g>
      </svg>
      <span class="brand-name">Weekplan</span>
    </div>
    <div class="topbar-right">
      <div id="cal-pills" class="cal-pills"></div>
      <button id="btn-add" class="btn-primary">+&nbsp;New block</button>
    </div>
  </header>

  <!-- Zone 2a: Week-range hero + navigation -->
  <section id="weekhead">
    <h1 id="weeklabel">&nbsp;</h1>
    <div class="wh-nav">
      <button id="nav-prev" aria-label="Previous week">&lsaquo;</button>
      <button id="nav-today" class="btn-today">Today</button>
      <button id="nav-next" aria-label="Next week">&rsaquo;</button>
    </div>
  </section>

  <!-- Zone 2b: Header panel -->
  <section id="headerpanel">
    <div class="hp-targets">
      <div class="hp-label">Weekly targets</div>
      <div id="targets"></div>
    </div>
    <div class="hp-minical">
      <div id="minical"></div>
    </div>
  </section>

  <!-- Zone 3: Week grid -->
  <main id="weekgrid"></main>

  <!-- Zone 4: Bottom bar -->
  <footer id="legend">
    <span class="leg"><i class="swatch cat-synced"></i> Synced</span>
    <span class="leg"><i class="swatch cat-focus"></i> Focus</span>
    <span class="leg"><i class="swatch cat-meeting"></i> Meeting</span>
    <span class="leg"><i class="swatch cat-task"></i> Task</span>
    <span class="leg"><i class="swatch cat-misc"></i> Misc</span>
  </footer>

  <script type="module" src="js/app.js"></script>
</body>
</html>
